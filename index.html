<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>lang// a browser interpreter</title>
<style>
  :root{
    --bg: #0d1117;
    --panel: #11161d;
    --line: #1f2732;
    --text: #d5dce3;
    --dim: #5b6672;
    --accent: #7ee787;
    --accent2: #58a6ff;
    --err: #ff7b72;
    --font-mono: 'JetBrains Mono', 'Fira Code', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
  html,body{ height:100%; margin:0; overflow:hidden; touch-action:none; overscroll-behavior:none; -webkit-text-size-adjust:100%; text-size-adjust:100%; }
  body{
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    display:flex;
    flex-direction:column;
    min-height:100vh;
    padding-left: env(safe-area-inset-left);
    padding-right: env(safe-area-inset-right);
    padding-bottom: env(safe-area-inset-bottom);
  }

  header{
    padding: max(18px, env(safe-area-inset-top)) 22px 14px;
    border-bottom: 1px solid var(--line);
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:8px;
  }
  header .brand{
    font-size: 15px;
    letter-spacing: 0.02em;
  }
  header .brand b{ color: var(--accent); font-weight:600; }
  header .status{
    font-size: 12px;
    color: var(--dim);
  }
  header .status.ready{ color: var(--accent2); }
  header .status.error{ color: var(--err); }
  header .status .dot{
    display:inline-block;
    width:6px; height:6px;
    border-radius:50%;
    background: var(--dim);
    margin-right:6px;
    position:relative;
    top:-1px;
  }
  header .status.ready .dot{ background: var(--accent2); box-shadow:0 0 6px var(--accent2); }
  header .status.error .dot{ background: var(--err); box-shadow:0 0 6px var(--err); }

  .tabs{
    display:flex;
    gap:2px;
    padding: 10px 22px 0;
    background: var(--panel);
  }
  .tab{
    font-family: var(--font-mono);
    font-size: 12.5px;
    letter-spacing: 0.02em;
    background: transparent;
    color: var(--dim);
    border: none;
    border-bottom: 2px solid transparent;
    padding: 8px 14px;
    cursor: pointer;
  }
  .tab:hover{ color: var(--text); }
  .tab.active{ color: var(--accent); border-bottom-color: var(--accent); }

  .view-toggle{
    display:none;
    gap:2px;
    padding: 10px 22px;
    background: var(--panel);
    border-bottom: 1px solid var(--line);
  }
  .view-toggle button{
    flex:1;
    font-family: var(--font-mono);
    font-size: 12.5px;
    letter-spacing: 0.02em;
    background: transparent;
    color: var(--dim);
    border: 1px solid var(--line);
    padding: 10px 14px;
    border-radius: 4px;
    cursor: pointer;
  }
  .view-toggle button.active{ color: var(--accent); border-color: #234a2e; background:#132318; }
  .view-toggle .badge{
    display:inline-block;
    min-width: 15px;
    padding: 0 4px;
    margin-left: 6px;
    border-radius: 8px;
    background: var(--accent2);
    color: var(--bg);
    font-size: 10px;
    line-height: 15px;
  }

  main{
    flex:1;
    display:flex;
    flex-direction:column;
    gap: 1px;
    background: var(--line);
    min-height:0;
  }
  main .pane[data-pane="script"]{ flex: 2 1 0; }
  main .pane[data-pane="output"]{ flex: 1 1 0; }

  @media (max-width: 859px){
    .view-toggle{ display:flex; }
    main.view-script .pane[data-pane="output"]{ display:none; }
    main.view-output .pane[data-pane="script"]{ display:none; }
    main.view-script .pane[data-pane="script"],
    main.view-output .pane[data-pane="output"]{ flex: 1 1 auto; }
  }

  .pane{
    background: var(--panel);
    display:flex;
    flex-direction:column;
    min-height:0;
  }
  .pane-label{
    font-size: 11px;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 10px 22px 0;
    flex: 0 0 auto;
  }
  .pane-label.output-label{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap: 10px;
  }
  .pane-label.output-label button{
    text-transform: none;
    letter-spacing: 0.02em;
    font-size: 11px;
    padding: 4px 10px;
  }

  #editor{
    flex:1;
    width:100%;
    resize:none;
    border:none;
    outline:none;
    background: transparent;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 16px;
    line-height: 1.6;
    padding: 8px 22px 18px;
    tab-size: 4;
    touch-action: pan-y;
    overscroll-behavior: contain;
  }
  #editor::placeholder{ color: var(--dim); }

  .toolbar{
    background: var(--panel);
    padding: 10px 22px;
    display:flex;
    align-items:center;
    gap: 10px;
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
    flex-wrap:wrap;
  }
  button{
    font-family: var(--font-mono);
    font-size: 12.5px;
    letter-spacing: 0.02em;
    background: transparent;
    color: var(--accent);
    border: 1px solid #234a2e;
    padding: 7px 14px;
    border-radius: 3px;
    cursor: pointer;
    transition: background 120ms ease, border-color 120ms ease;
  }
  button:hover:not(:disabled){ background:#132318; border-color: var(--accent); }
  button:disabled{ opacity:0.4; cursor:not-allowed; }
  button.secondary{ color: var(--dim); border-color: var(--line); }
  button.secondary:hover:not(:disabled){ background:#161c24; border-color:#3a4553; color:var(--text); }
  .hint{
    margin-left:auto;
    font-size:11.5px;
    color: var(--dim);
  }
  @media (max-width: 859px){
    button{ padding: 9px 14px; font-size: 13px; }
    .hint{ display:none; }
    .toolbar{ padding: 10px 16px; }
    .pane-label{ padding: 10px 16px 0; }
    #editor{ padding: 8px 16px 18px; }
    #output{ padding: 8px 16px 20px; }
    header{ padding-left: 16px; padding-right: 16px; }
    .tabs{ padding-left: 16px; padding-right: 16px; }
    footer{ display:none; }
  }
  kbd{
    background:#182029;
    border:1px solid var(--line);
    border-radius:3px;
    padding:1px 5px;
    font-size:11px;
    color:var(--text);
  }

  #output{
    flex:1;
    overflow-y:auto;
    padding: 8px 22px 20px;
    font-size: 13.5px;
    line-height: 1.65;
    white-space: pre-wrap;
    word-break: break-word;
    touch-action: pan-y;
    overscroll-behavior: contain;
  }
  #output .line{ margin: 0; }
  #output .stdout{ color: var(--text); }
  #output .stderr{ color: var(--err); }
  #output .system{ color: var(--dim); font-style: italic; }
  #output .prompt{ color: var(--accent2); }
  #output .result{ color: var(--accent); }

  footer{
    padding: 8px 22px;
    font-size: 11px;
    color: var(--dim);
    border-top: 1px solid var(--line);
  }
  footer a{ color: var(--dim); }

  #output::-webkit-scrollbar, #editor::-webkit-scrollbar{ width:8px; }
  #output::-webkit-scrollbar-thumb{ background:#232c37; border-radius:4px; }

  .modal-overlay{
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.55);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
  }
  .modal-overlay.open{ display: flex; }
  .modal-box{
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 20px 22px;
    max-width: 340px;
    width: calc(100% - 40px);
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
  }
  .modal-box p{
    margin: 0 0 16px;
    font-size: 13.5px;
    line-height: 1.6;
    color: var(--text);
  }
  .modal-actions{
    display: flex;
    justify-content: flex-end;
    gap: 10px;
  }
  .modal-actions button.danger{
    color: var(--err);
    border-color: #4a2323;
  }
  .modal-actions button.danger:hover{
    background: #231313;
    border-color: var(--err);
  }
</style>
</head>
<body>

<header>
  <div class="brand">lang<b>//</b> a browser interpreter</div>
  <div class="status" id="status"><span class="dot"></span>select a language</div>
</header>

<div class="tabs" id="tabs">
  <button class="tab active" data-lang="python">Python</button>
  <button class="tab" data-lang="c">C / C++</button>
  <button class="tab" data-lang="basic">BASIC</button>
</div>

<div class="view-toggle" id="viewToggle">
  <button class="active" data-view="script">Script</button>
  <button data-view="output">Output</button>
</div>

<main id="main" class="view-script">
  <div class="pane" data-pane="script">
    <div class="pane-label">script</div>
    <textarea id="editor" spellcheck="false"></textarea>
    <div class="toolbar">
      <button id="run" disabled>run Ō¢Ė</button>
      <button id="saveScript" class="secondary">save script</button>
      <button id="clearScript" class="secondary">clear script</button>
      <span class="hint">ŌĆī<kbd>Ctrl</kbd>/<kbd>Cmd</kbd> + <kbd>Enter</kbd> to run</span>
    </div>
  </div>

  <div class="pane" data-pane="output">
    <div class="pane-label output-label">
      <span>output</span>
      <button id="clear" class="secondary">clear output</button>
    </div>
    <div id="output"></div>
  </div>
</main>

<footer id="footer">Powered by Skulpt, a pure-JavaScript Python implementation ŌĆö runs entirely in your browser, nothing is sent to a server.</footer>

<div class="modal-overlay" id="clearScriptModal">
  <div class="modal-box">
    <p>Clear the script? This can't be undone.</p>
    <div class="modal-actions">
      <button id="clearScriptCancel" class="secondary">cancel</button>
      <button id="clearScriptConfirm" class="danger">clear script</button>
    </div>
  </div>
</div>

<script>
  // ---------- generic script loader with CDN fallbacks ----------
  function loadScript(url){
    return new Promise((resolve, reject) => {
      const s = document.createElement('script');
      s.src = url;
      s.onload = () => resolve(url);
      s.onerror = () => reject(new Error('failed: ' + url));
      document.head.appendChild(s);
    });
  }
  async function loadFromSources(sources){
    let lastErr;
    for(const url of sources){
      try{ await loadScript(url); return url; }catch(e){ lastErr = e; }
    }
    throw lastErr;
  }
</script>

<script>
  // =====================================================================
  // BASIC ŌĆö small hand-written interpreter (pure JS, nothing to load)
  // Supports: LET, PRINT, IF..THEN, FOR/NEXT/STEP, GOTO, GOSUB/RETURN,
  //           DATA/READ, REM, END/STOP. Numeric + string ($) variables.
  // =====================================================================
  const BasicInterpreter = (function(){

    function tokenize(expr){
      const tokens = [];
      let i = 0;
      while(i < expr.length){
        const c = expr[i];
        if(/\s/.test(c)){ i++; continue; }
        if(c === '"'){
          let j = i+1, s = '';
          while(j < expr.length){
            if(expr[j] === '"'){
              if(expr[j+1] === '"'){ s += '"'; j += 2; continue; }
              break;
            }
            s += expr[j]; j++;
          }
          tokens.push({t:'STRING', v:s});
          i = j+1; continue;
        }
        if(/[0-9]/.test(c) || (c === '.' && /[0-9]/.test(expr[i+1]||''))){
          let j = i, s='';
          while(j<expr.length && /[0-9.]/.test(expr[j])){ s+=expr[j]; j++; }
          tokens.push({t:'NUMBER', v:parseFloat(s)});
          i = j; continue;
        }
        if(/[A-Za-z]/.test(c)){
          let j=i, s='';
          while(j<expr.length && /[A-Za-z0-9]/.test(expr[j])){ s+=expr[j]; j++; }
          if(expr[j] === '$'){ s += '$'; j++; }
          tokens.push({t:'IDENT', v:s.toUpperCase()});
          i = j; continue;
        }
        if(c === '<' && expr[i+1] === '>'){ tokens.push({t:'OP', v:'<>'}); i+=2; continue; }
        if(c === '<' && expr[i+1] === '='){ tokens.push({t:'OP', v:'<='}); i+=2; continue; }
        if(c === '>' && expr[i+1] === '='){ tokens.push({t:'OP', v:'>='}); i+=2; continue; }
        if('+-*/^()=,<>'.includes(c)){ tokens.push({t:'OP', v:c}); i++; continue; }
        throw new Error('Unexpected character: ' + c);
      }
      return tokens;
    }

    function makeParser(tokens, ctx){
      let pos = 0;
      function peek(){ return tokens[pos]; }
      function next(){ return tokens[pos++]; }
      function expectOp(v){
        const t = next();
        if(!t || t.t !== 'OP' || t.v !== v) throw new Error('Expected "'+v+'"');
      }

      function parsePrimary(){
        const t = peek();
        if(!t) throw new Error('Unexpected end of expression');
        if(t.t === 'NUMBER'){ next(); return t.v; }
        if(t.t === 'STRING'){ next(); return t.v; }
        if(t.t === 'OP' && t.v === '('){ next(); const v = parseOr(); expectOp(')'); return v; }
        if(t.t === 'OP' && t.v === '-'){ next(); return -parseUnary(); }
        if(t.t === 'IDENT'){
          next();
          const name = t.v;
          if(peek() && peek().t==='OP' && peek().v==='('){
            next();
            const args = [];
            if(!(peek() && peek().t==='OP' && peek().v===')')){
              args.push(parseOr());
              while(peek() && peek().t==='OP' && peek().v===','){ next(); args.push(parseOr()); }
            }
            expectOp(')');
            return callFn(name, args);
          }
          return ctx.getVar(name);
        }
        throw new Error('Unexpected token in expression');
      }

      function callFn(name, args){
        switch(name){
          case 'ABS': return Math.abs(args[0]);
          case 'INT': return Math.floor(args[0]);
          case 'SQR': return Math.sqrt(args[0]);
          case 'RND': return Math.random();
          case 'SIN': return Math.sin(args[0]);
          case 'COS': return Math.cos(args[0]);
          case 'LEN': return String(args[0]).length;
          case 'VAL': return parseFloat(args[0]) || 0;
          case 'STR$': return String(args[0]);
          case 'CHR$': return String.fromCharCode(args[0]);
          case 'ASC': return String(args[0]).charCodeAt(0);
          case 'LEFT$': return String(args[0]).slice(0, args[1]);
          case 'RIGHT$': return String(args[0]).slice(-args[1]);
          case 'MID$': return String(args[0]).slice(args[1]-1, args[2]!==undefined? args[1]-1+args[2] : undefined);
          default: throw new Error('Unknown function ' + name);
        }
      }

      function parseUnary(){ return parsePrimary(); }

      function parsePow(){
        let v = parseUnary();
        while(peek() && peek().t==='OP' && peek().v==='^'){ next(); v = Math.pow(v, parseUnary()); }
        return v;
      }

      function parseMul(){
        let v = parsePow();
        while(peek() && peek().t==='OP' && (peek().v==='*'||peek().v==='/')){
          const op = next().v;
          const rhs = parsePow();
          v = op==='*' ? v*rhs : v/rhs;
        }
        return v;
      }

      function parseAdd(){
        let v = parseMul();
        while(peek() && peek().t==='OP' && (peek().v==='+'||peek().v==='-')){
          const op = next().v;
          const rhs = parseMul();
          if(op==='+'){
            v = (typeof v==='string'||typeof rhs==='string') ? String(v)+String(rhs) : v+rhs;
          } else {
            v = v - rhs;
          }
        }
        return v;
      }

      function parseCompare(){
        let v = parseAdd();
        while(peek() && peek().t==='OP' && ['=','<>','<','<=','>','>='].includes(peek().v)){
          const op = next().v;
          const rhs = parseAdd();
          switch(op){
            case '=': v = (v===rhs) ? -1 : 0; break;
            case '<>': v = (v!==rhs) ? -1 : 0; break;
            case '<': v = (v<rhs) ? -1 : 0; break;
            case '<=': v = (v<=rhs) ? -1 : 0; break;
            case '>': v = (v>rhs) ? -1 : 0; break;
            case '>=': v = (v>=rhs) ? -1 : 0; break;
          }
        }
        return v;
      }

      function parseNot(){
        if(peek() && peek().t==='IDENT' && peek().v==='NOT'){ next(); return (parseNot()===0) ? -1 : 0; }
        return parseCompare();
      }
      function parseAnd(){
        let v = parseNot();
        while(peek() && peek().t==='IDENT' && peek().v==='AND'){ next(); const rhs=parseNot(); v = (v!==0 && rhs!==0) ? -1 : 0; }
        return v;
      }
      function parseOr(){
        let v = parseAnd();
        while(peek() && peek().t==='IDENT' && peek().v==='OR'){ next(); const rhs=parseAnd(); v = (v!==0 || rhs!==0) ? -1 : 0; }
        return v;
      }

      return { parseExpr: parseOr, atEnd: () => pos >= tokens.length };
    }

    function evalExpr(exprStr, ctx){
      const tokens = tokenize(exprStr);
      const p = makeParser(tokens, ctx);
      return p.parseExpr();
    }

    function parseProgram(source){
      const program = [];
      for(const raw of source.split('\n')){
        const line = raw.trim();
        if(!line) continue;
        const m = line.match(/^(\d+)\s*(.*)$/);
        if(!m) throw new Error('Missing line number: "' + line + '"');
        program.push({ num: parseInt(m[1],10), text: m[2] });
      }
      program.sort((a,b) => a.num - b.num);
      return program;
    }

    function run(source, log){
      const program = parseProgram(source);
      const lineIndex = {};
      program.forEach((l,i) => { lineIndex[l.num] = i; });

      // pre-scan DATA
      const dataPool = [];
      for(const line of program){
        const m = line.text.match(/^DATA\s+(.*)$/i);
        if(m){
          for(let part of m[1].split(',')){
            part = part.trim();
            if(/^".*"$/.test(part)) dataPool.push(part.slice(1,-1));
            else if(!isNaN(parseFloat(part))) dataPool.push(parseFloat(part));
            else dataPool.push(part);
          }
        }
      }
      let dataPtr = 0;

      const vars = {};
      const ctx = {
        getVar(name){
          if(name.endsWith('$')) return vars.hasOwnProperty(name) ? vars[name] : '';
          return vars.hasOwnProperty(name) ? vars[name] : 0;
        },
        setVar(name, val){ vars[name] = val; }
      };

      let lineBuffer = '';
      function flushLine(){
        log(lineBuffer, 'stdout');
        lineBuffer = '';
      }
      function printChunk(s, endsWithNewline){
        lineBuffer += s;
        if(endsWithNewline){ flushLine(); }
      }

      const forStack = [];
      const gosubStack = [];

      function execPrint(argsStr){
        argsStr = argsStr.trim();
        if(argsStr === ''){ flushLine(); return; }
        const parts = [];
        let depth=0, cur='', inStr=false;
        for(let k=0;k<argsStr.length;k++){
          const c = argsStr[k];
          if(c === '"') inStr = !inStr;
          if(!inStr && c === '(') depth++;
          if(!inStr && c === ')') depth--;
          if(!inStr && depth===0 && (c===',' || c===';')){
            parts.push(cur); parts.push(c); cur='';
          } else { cur += c; }
        }
        parts.push(cur);
        let suppressNL = false;
        for(const p of parts){
          if(p === ','){ printChunk('\t', false); suppressNL = true; continue; }
          if(p === ';'){ suppressNL = true; continue; }
          const trimmed = p.trim();
          if(trimmed === '') continue;
          const val = evalExpr(trimmed, ctx);
          printChunk(String(val), false);
          suppressNL = false;
        }
        if(!suppressNL) flushLine();
      }

      function findMatchingNext(fromIdx, varName){
        let depth = 0;
        for(let i=fromIdx+1;i<program.length;i++){
          const t = program[i].text;
          if(/^FOR\b/i.test(t)) depth++;
          const nm = t.match(/^NEXT\b\s*([A-Za-z0-9]*)/i);
          if(nm){
            if(depth === 0) return i;
            depth--;
          }
        }
        throw new Error('NEXT without FOR');
      }

      let pc = 0;
      let running = true;
      let steps = 0;
      const maxSteps = 300000;
      const startTime = Date.now();

      while(running && pc < program.length){
        if(++steps > maxSteps || Date.now()-startTime > 5000){
          log('(stopped: program exceeded step/time limit ŌĆö possible infinite loop)', 'stderr');
          break;
        }
        const line = program[pc];
        const text = line.text;
        let jumpTo = undefined;

        try{
          if(text === '' || /^REM\b/i.test(text) || /^DATA\b/i.test(text)){
            // no-op
          } else if(/^END\b/i.test(text) || /^STOP\b/i.test(text)){
            running = false;
          } else if(/^GOTO\s+(\d+)/i.test(text)){
            const n = parseInt(text.match(/^GOTO\s+(\d+)/i)[1],10);
            if(!(n in lineIndex)) throw new Error('Undefined line ' + n);
            jumpTo = lineIndex[n];
          } else if(/^GOSUB\s+(\d+)/i.test(text)){
            const n = parseInt(text.match(/^GOSUB\s+(\d+)/i)[1],10);
            if(!(n in lineIndex)) throw new Error('Undefined line ' + n);
            gosubStack.push(pc+1);
            jumpTo = lineIndex[n];
          } else if(/^RETURN\b/i.test(text)){
            if(gosubStack.length===0) throw new Error('RETURN without GOSUB');
            jumpTo = gosubStack.pop();
          } else if(/^PRINT\b/i.test(text)){
            execPrint(text.replace(/^PRINT\b/i, ''));
          } else if(/^IF\b(.*)\bTHEN\b(.*)$/i.test(text)){
            const m = text.match(/^IF\b(.*)\bTHEN\b(.*)$/i);
            const cond = evalExpr(m[1].trim(), ctx);
            if(cond !== 0){
              const thenPart = m[2].trim();
              if(/^\d+$/.test(thenPart)){
                jumpTo = lineIndex[parseInt(thenPart,10)];
              } else {
                jumpTo = execOneStatement(thenPart);
              }
            }
          } else if(/^FOR\s+([A-Za-z][A-Za-z0-9]*)\s*=\s*(.+?)\s+TO\s+(.+?)(?:\s+STEP\s+(.+))?$/i.test(text)){
            const m = text.match(/^FOR\s+([A-Za-z][A-Za-z0-9]*)\s*=\s*(.+?)\s+TO\s+(.+?)(?:\s+STEP\s+(.+))?$/i);
            const vname = m[1].toUpperCase();
            const startV = evalExpr(m[2], ctx);
            const endV = evalExpr(m[3], ctx);
            const stepV = m[4] !== undefined ? evalExpr(m[4], ctx) : 1;
            ctx.setVar(vname, startV);
            if((stepV >= 0 && startV > endV) || (stepV < 0 && startV < endV)){
              jumpTo = findMatchingNext(pc, vname) + 1;
            } else {
              forStack.push({ varName: vname, end: endV, step: stepV, bodyPc: pc+1 });
            }
          } else if(/^NEXT\b/i.test(text)){
            if(forStack.length===0) throw new Error('NEXT without FOR');
            const fr = forStack[forStack.length-1];
            const cur = ctx.getVar(fr.varName) + fr.step;
            ctx.setVar(fr.varName, cur);
            if((fr.step >= 0 && cur <= fr.end) || (fr.step < 0 && cur >= fr.end)){
              jumpTo = fr.bodyPc;
            } else {
              forStack.pop();
            }
          } else if(/^READ\b/i.test(text)){
            const names = text.replace(/^READ\b/i,'').split(',').map(s=>s.trim()).filter(Boolean);
            for(const nm of names){
              if(dataPtr >= dataPool.length) throw new Error('Out of DATA');
              ctx.setVar(nm.toUpperCase(), dataPool[dataPtr++]);
            }
          } else {
            jumpTo = execOneStatement(text, true);
          }
        }catch(err){
          log('Line ' + line.num + ': ' + err.message, 'stderr');
          break;
        }

        pc = (jumpTo !== undefined) ? jumpTo : pc+1;
      }

      function execOneStatement(stmt){
        stmt = stmt.trim();
        if(/^LET\b/i.test(stmt)) stmt = stmt.replace(/^LET\b/i,'').trim();
        const m = stmt.match(/^([A-Za-z][A-Za-z0-9]*\$?)\s*=\s*(.+)$/);
        if(m){
          ctx.setVar(m[1].toUpperCase(), evalExpr(m[2], ctx));
          return undefined;
        }
        if(/^GOTO\s+(\d+)/i.test(stmt)){
          const n = parseInt(stmt.match(/^GOTO\s+(\d+)/i)[1],10);
          return lineIndex[n];
        }
        if(/^PRINT\b/i.test(stmt)){ execPrint(stmt.replace(/^PRINT\b/i,'')); return undefined; }
        throw new Error('Cannot parse statement: ' + stmt);
      }

      if(lineBuffer !== '') flushLine();
    }

    return { run };
  })();

`,
    c:
`#include <iostream>
using namespace std;

int main() {
    int a = 0, b = 1;
    cout << "fib(10): ";
    for (int i = 0; i < 10; i++) {
        cout << a << " ";
        int next = a + b;
        a = b;
        b = next;
    }
    cout << endl;
    return 0;
}
`,
    basic:
`10 REM fibonacci demo
20 LET A = 0
30 LET B = 1
40 PRINT "FIB(10):";
50 FOR I = 1 TO 10
60 PRINT A;
70 LET C = A + B
80 LET A = B
90 LET B = C
100 NEXT I
110 PRINT
120 END
`
  };

  const PYTHON_LABEL_SOURCES = [
    'https://cdn.jsdelivr.net/npm/skulpt@1.2.0/dist/skulpt.min.js',
    'https://unpkg.com/skulpt@1.2.0/dist/skulpt.min.js',
    'https://cdn.jsdelivr.net/gh/Tezumie/Skulpt-CDN@latest/skulpt.min.js'
  ];
  const PYTHON_STDLIB_SOURCES = [
    'https://cdn.jsdelivr.net/npm/skulpt@1.2.0/dist/skulpt-stdlib.js',
    'https://unpkg.com/skulpt@1.2.0/dist/skulpt-stdlib.js',
    'https://cdn.jsdelivr.net/gh/Tezumie/Skulpt-CDN@latest/skulpt-stdlib.js'
  ];
  const C_SOURCES = [];

  function builtinRead(x){
    if(Sk.builtinFiles === undefined || Sk.builtinFiles['files'][x] === undefined){
      throw 'File not found: "' + x + '"';
    }
    return Sk.builtinFiles['files'][x];
  }

  const RUNTIMES = {
    python: {
      label: 'Python',
      ext: 'py',
      footer: 'Powered by Skulpt, a pure-JavaScript Python implementation ŌĆö runs entirely in your browser, nothing is sent to a server.',
      state: 'idle',
      async load(log){
        log('loading Python runtimeŌĆ”', 'system');
        await loadFromSources(PYTHON_LABEL_SOURCES);
        await loadFromSources(PYTHON_STDLIB_SOURCES);
        if(typeof Sk === 'undefined') throw new Error('Scripts loaded but Sk is undefined.');
        log('ready. Skulpt (Python 3 subset, pure JS ŌĆö no WebAssembly needed)', 'system');
      },
      run(code, log){
        return new Promise((resolve) => {
          Sk.configure({
            output: (text) => log(text.replace(/\n$/, ''), 'stdout'),
            read: builtinRead,
            __future__: Sk.python3,
            execLimit: 10000
          });
          Sk.misceval.asyncToPromise(function(){
            return Sk.importMainWithBody('<stdin>', false, code, true);
          }).then(
            () => resolve(),
            (err) => { log(err.toString(), 'stderr'); resolve(); }
          );
        });
      }
    },

    c: {
      label: 'C / C++',
      ext: 'cpp',
      footer: 'Powered by JSCPP, a pure-JavaScript C/C++ interpreter (subset of the language, iostream-based) ŌĆö runs entirely in your browser.',
      state: 'idle',
      async load(log){
        log('initializing C/C++ runtime (bundled inline, no network needed)ŌĆ”', 'system');
        if(typeof JSCPP === 'undefined') throw new Error('Bundled JSCPP script did not set window.JSCPP.');
        log('ready. JSCPP (C/C++ subset, pure JS ŌĆö no WebAssembly needed)', 'system');
      },
      run(code, log){
        return new Promise((resolve) => {
          let buffer = '';
          const flush = () => {
            if(buffer.length){
              const parts = buffer.split('\n');
              buffer = parts.pop();
              for(const p of parts) log(p, 'stdout');
            }
          };
          try{
            const exitCode = JSCPP.run(code, '', {
              stdio: { write: (s) => { buffer += s; flush(); } }
            });
            if(buffer.length){ log(buffer, 'stdout'); buffer=''; }
            log('(program exited with code ' + exitCode + ')', 'system');
          }catch(err){
            if(buffer.length){ log(buffer, 'stdout'); buffer=''; }
            log((err && err.message) ? err.message : String(err), 'stderr');
          }
          resolve();
        });
      }
    },

    basic: {
      label: 'BASIC',
      ext: 'bas',
      footer: 'A small hand-written BASIC interpreter (pure JS) ŌĆö supports LET, PRINT, IF/THEN, FOR/NEXT, GOTO, GOSUB/RETURN, DATA/READ.',
      state: 'ready',
      async load(){ /* no external runtime needed */ },
      run(code, log){
        try{
          BasicInterpreter.run(code, log);
        }catch(err){
          log((err && err.message) ? err.message : String(err), 'stderr');
        }
        return Promise.resolve();
      }
    }
  };

  // =====================================================================
  // UI wiring
  // =====================================================================
  const editor = document.getElementById('editor');
  const output = document.getElementById('output');
  const runBtn = document.getElementById('run');
  const clearBtn = document.getElementById('clear');
  const saveScriptBtn = document.getElementById('saveScript');
  const clearScriptBtn = document.getElementById('clearScript');
  const clearScriptModal = document.getElementById('clearScriptModal');
  const clearScriptCancel = document.getElementById('clearScriptCancel');
  const clearScriptConfirm = document.getElementById('clearScriptConfirm');
  const status = document.getElementById('status');
  const footerEl = document.getElementById('footer');
  const tabsEl = document.getElementById('tabs');
  const mainEl = document.getElementById('main');
  const viewToggle = document.getElementById('viewToggle');

  const buffers = { python: SAMPLES.python, c: SAMPLES.c, basic: SAMPLES.basic };
  let currentLang = 'python';
  let currentView = 'script';
  let unreadOutput = 0;

  function log(text, cls){
    const div = document.createElement('div');
    div.className = 'line ' + cls;
    div.textContent = text;
    output.appendChild(div);
    output.scrollTop = output.scrollHeight;
    if(currentView !== 'output'){
      unreadOutput++;
      updateOutputBadge();
    }
  }

  function updateOutputBadge(){
    const btn = viewToggle.querySelector('[data-view="output"]');
    const existing = btn.querySelector('.badge');
    if(existing) existing.remove();
    if(unreadOutput > 0){
      const span = document.createElement('span');
      span.className = 'badge';
      span.textContent = unreadOutput > 9 ? '9+' : String(unreadOutput);
      btn.appendChild(span);
    }
  }

  function switchView(view){
    currentView = view;
    mainEl.className = 'view-' + view;
    [...viewToggle.children].forEach(btn => btn.classList.toggle('active', btn.dataset.view === view));
    if(view === 'output'){
      unreadOutput = 0;
      updateOutputBadge();
      output.scrollTop = output.scrollHeight;
    }
  }

  function setStatus(text, kind){
    status.className = 'status' + (kind ? ' ' + kind : '');
    status.innerHTML = '<span class="dot"></span>' + text;
  }

  async function ensureLoaded(lang){
    const rt = RUNTIMES[lang];
    if(rt.state === 'ready') return;
    if(rt.state === 'loading') return rt.loadingPromise;
    rt.state = 'loading';
    runBtn.disabled = true;
    setStatus(rt.label + ': loading runtimeŌĆ”');
    rt.loadingPromise = rt.load(log).then(
      () => { rt.state = 'ready'; if(currentLang===lang){ setStatus(rt.label+': ready','ready'); runBtn.disabled=false; } },
      (err) => { rt.state = 'error'; if(currentLang===lang){ setStatus(rt.label+': failed to load','error'); log('Could not load '+rt.label+' runtime: '+err.message, 'stderr'); } }
    );
    return rt.loadingPromise;
  }

  function switchLang(lang){
    buffers[currentLang] = editor.value;
    currentLang = lang;
    editor.value = buffers[lang];
    footerEl.textContent = RUNTIMES[lang].footer;
    [...tabsEl.children].forEach(btn => btn.classList.toggle('active', btn.dataset.lang === lang));

    const rt = RUNTIMES[lang];
    if(rt.state === 'ready'){ setStatus(rt.label + ': ready', 'ready'); runBtn.disabled = false; }
    else if(rt.state === 'error'){ setStatus(rt.label + ': failed to load', 'error'); runBtn.disabled = true; }
    else { runBtn.disabled = true; ensureLoaded(lang); }
  }

  async function runCurrent(){
    if(runBtn.disabled) return;
    const rt = RUNTIMES[currentLang];
    switchView('output');
    await ensureLoaded(currentLang);
    if(rt.state !== 'ready') return;
    log('Ō¢Ė running (' + rt.label + ')ŌĆ”', 'prompt');
    runBtn.disabled = true;
    await rt.run(editor.value, log);
    runBtn.disabled = false;
  }

  tabsEl.addEventListener('click', (e) => {
    const btn = e.target.closest('.tab');
    if(btn) switchLang(btn.dataset.lang);
  });

  viewToggle.addEventListener('click', (e) => {
    const btn = e.target.closest('button');
    if(btn) switchView(btn.dataset.view);
  });

  runBtn.addEventListener('click', runCurrent);
  clearBtn.addEventListener('click', () => { output.innerHTML = ''; });
  saveScriptBtn.addEventListener('click', () => {
    const ext = RUNTIMES[currentLang].ext;
    const blob = new Blob([editor.value], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'script.' + ext;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  });
  clearScriptBtn.addEventListener('click', () => {
    clearScriptModal.classList.add('open');
  });
  clearScriptCancel.addEventListener('click', () => {
    clearScriptModal.classList.remove('open');
  });
  clearScriptConfirm.addEventListener('click', () => {
    editor.value = '';
    editor.focus();
    clearScriptModal.classList.remove('open');
  });
  clearScriptModal.addEventListener('click', (e) => {
    if(e.target === clearScriptModal) clearScriptModal.classList.remove('open');
  });
  document.addEventListener('keydown', (e) => {
    if(e.key === 'Escape' && clearScriptModal.classList.contains('open')){
      clearScriptModal.classList.remove('open');
    }
  });
  editor.addEventListener('keydown', (e) => {
    if((e.ctrlKey || e.metaKey) && e.key === 'Enter'){
      e.preventDefault();
      runCurrent();
    }
    if(e.key === 'Tab'){
      e.preventDefault();
      const start = editor.selectionStart, end = editor.selectionEnd;
      editor.value = editor.value.slice(0, start) + '    ' + editor.value.slice(end);
      editor.selectionStart = editor.selectionEnd = start + 4;
    }
  });

  // initial state
  editor.value = buffers.python;
  ensureLoaded('python');
</script>
</body>
</html>
